services:
  postgres:
    image: postgres:16-alpine
    container_name: slapshot-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: slapshot_club
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  postgres_test:
    image: postgres:16-alpine
    container_name: slapshot-db-test
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: slapshot_club_test
    ports:
      - '5433:5432'

  redis:
    image: redis:7-alpine
    container_name: slapshot-redis
    ports:
      - '6379:6379'

volumes:
  pgdata:
